name: pulse

services:
  mongo:
    image: mongo:7.0
    container_name: pulse_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.2-alpine
    container_name: pulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: pulse_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  clamav:
    # arm64-compatible multi-arch ClamAV. Pulls ~250MB of virus definitions
    # on first start; subsequent boots are fast.
    image: clamav/clamav-debian:stable
    container_name: pulse_clamav
    restart: unless-stopped
    # ClamAV downloads its virus definitions (~250 MB) on first start —
    # the healthcheck won't pass until that's done. Subsequent starts are fast.
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 5m
    volumes:
      - clamav_db:/var/lib/clamav
    ports:
      - "3310:3310"

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: pulse_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        set -e;
        echo '[minio-init] configuring local alias';
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minio} ${MINIO_SECRET_KEY:-minio12345};
        echo '[minio-init] creating bucket ${MINIO_BUCKET:-petitions}';
        mc mb -p local/${MINIO_BUCKET:-petitions} || true;
        echo '[minio-init] done';
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: pulse_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017/pulse
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/repo
      - api_node_modules:/repo/node_modules
    working_dir: /repo/apps/api
    command: ["npx", "tsx", "watch", "src/index.ts"]

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.dev
    container_name: pulse_worker
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017/pulse
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:8b}
      USCIS_API_BASE: ${USCIS_API_BASE:-https://api-int.uscis.gov}
      USCIS_API_CLIENT_ID: ${USCIS_API_CLIENT_ID:-}
      USCIS_API_CLIENT_SECRET: ${USCIS_API_CLIENT_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/repo
      - worker_node_modules:/repo/node_modules
    working_dir: /repo/apps/worker
    command: ["npx", "tsx", "watch", "src/index.ts"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: pulse_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_INTERNAL_URL: http://api:4000
    depends_on:
      api:
        condition: service_started
    volumes:
      - .:/repo
      - web_node_modules:/repo/node_modules
      - next_cache:/repo/apps/web/.next
    working_dir: /repo/apps/web
    command: ["npm", "run", "dev"]

volumes:
  mongo_data: {}
  minio_data: {}
  clamav_db: {}
  api_node_modules: {}
  worker_node_modules: {}
  web_node_modules: {}
  next_cache: {}
